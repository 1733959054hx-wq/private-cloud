spring.application.name=private_cloud_back

server.port=8080

# 安全认证开关：false=开发模式(所有接口免登录)  true=生产模式(JWT鉴权生效)
app.security.enabled=true

# 盲索引去关联化密钥（HMAC_SHA256）：用于切断 sys_user 与 sys_user_credential 的明文ID关联
# 拖库后缺少此密钥则无法将密码凭证对应到具体用户
app.security.blind-index-secret=${BLIND_INDEX_SECRET:change-me}

# IP网络准入拦截器（NAC）：false=关闭  true=仅允许准入网段IP访问
app.ip-filter.enabled=false

# 准入网段前缀（逗号分隔）：校园网有线 + 红米手机热点
app.ip-filter.allowed-subnets=192.168.10.,10.50.167.

# 登录防暴破解配置
app.login.max-fail-count=5
app.login.lock-minutes=15

# ============ 启动验证总开关 ============
# 启动时验证外部服务（RabbitMQ、MinIO、Redis、ES）是否已启动
# true=验证，未启动则报错阻止启动；false=不验证，允许启动
app.startup-check.enabled=true

spring.datasource.url=jdbc:mysql://localhost:3306/private_cloud?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=privatecloud
spring.datasource.password=${DB_PASSWORD:change-me}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.location=${file.upload-dir}/temp/multipart

file.upload-dir=./uploads
file.temp-dir=./temp
file.batch-download-expire-hours=24

jwt.secret=${JWT_SECRET:change-me}
jwt.expiration=86400000

# AI 服务配置（知识问答、脑图生成等统一使用）
# 各 AI 厂商统一配置
# GlmConfig（prefix=glm）：智谱 GLM
glm.api-key=${GLM_API_KEY:change-me}
glm.base-url=https://open.bigmodel.cn/api/paas/v4
glm.free-model=glm-4.7-flash
# DeepSeekConfig（prefix=deepseek）：DeepSeek
deepseek.api-key=${DEEPSEEK_API_KEY:change-me}
deepseek.base-url=https://api.deepseek.com
deepseek.flash-model=deepseek-v4-flash
deepseek.pro-model=deepseek-v4-pro
# MimoConfig（prefix=mimo）：小米 MiMo
mimo.api-key=${MIMO_API_KEY:change-me}
mimo.base-url=https://token-plan-cn.xiaomimimo.com/v1
mimo.flash-model=mimo-v2.5
mimo.pro-model=mimo-v2.5-pro

spring.freemarker.template-loader-path=classpath:/templates/
spring.freemarker.cache=false
spring.freemarker.charset=UTF-8
spring.freemarker.suffix=.ftl

# OCR
ocr.provider=baidu
ocr.api-key=${OCR_API_KEY:change-me}
ocr.secret-key=${OCR_SECRET_KEY:change-me}

# 百度语音识别
baidu.speech.app-id=${BAIDU_SPEECH_APP_ID:change-me}
baidu.speech.api-key=${BAIDU_SPEECH_API_KEY:change-me}
baidu.speech.secret-key=${BAIDU_SPEECH_SECRET_KEY:change-me}

# Elasticsearch
spring.elasticsearch.enabled=true
spring.elasticsearch.uris=http://localhost:9200

# ============ 日志配置 ============
# 二级缓存 DEBUG 日志（验证缓存命中情况）
logging.level.front.cache=DEBUG
logging.level.front.workspace.documentspace.service.FileListCacheService=DEBUG
logging.level.front.system.service.SysUserService=DEBUG

# 静音 POI 库内部噪音
logging.level.org.apache.poi=ERROR
spring.elasticsearch.connection-timeout=5s
spring.elasticsearch.socket-timeout=60s

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:change-me}
spring.data.redis.database=0
spring.data.redis.timeout=5000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=-1ms

# ============ MinIO 对象存储（扩展点1）============
# 是否启用 MinIO（false 时全部走本地磁盘）
minio.enabled=true
minio.endpoint=http://localhost:9000
minio.access-key=${MINIO_ACCESS_KEY:change-me}
minio.secret-key=${MINIO_SECRET_KEY:change-me}
minio.bucket-name=private-cloud
# 新上传文件大小阈值（字节），>= 该值走 MinIO；0 表示全部走 MinIO
minio.min-size=0
# 预签名 URL 有效期（分钟）
minio.presigned-expiry=30

# ============ RabbitMQ 消息队列（扩展点2）============
# 是否启用 MQ（false 时降级为线程池执行）
mq.enabled=true
# 启动时清空队列积压消息（true=清空，false=不清空）
# 解决：后端重启后自动消费历史积压消息（如未登录就执行文本提取）
# 使用：设为 true 重启一次后改回 false
mq.purge-on-startup=true
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/
# 消费者 ACK：手动确认
spring.rabbitmq.listener.simple.acknowledge-mode=manual
# 发布者确认：correlated 模式，异步回调确认消息到达 Broker
spring.rabbitmq.publisher-confirm-type=correlated
# 发布者返回：消息无法路由时退回
spring.rabbitmq.publisher-returns=true
# AI 等长耗时任务消费者超时（毫秒，30 分钟）
spring.rabbitmq.listener.simple.consumer-timeout=1800000
# 预取数量
spring.rabbitmq.listener.simple.prefetch=1
# 启动时是否自动创建队列/交换机
spring.rabbitmq.listener.simple.missing-queues-fatal=false

# ============ Caffeine 本地缓存（扩展点3）============
# 缓存名称（逗号分隔）
cache.caffeine.names=userPermissions,fileList,sysConfig
# 用户权限缓存：最大 1000 条，写入后 10 分钟过期
cache.caffeine.user-permissions.spec=maximumSize=1000,expireAfterWrite=10m
# 文件列表缓存：最大 500 条，写入后 30 秒过期（一致性要求高）
cache.caffeine.file-list.spec=maximumSize=500,expireAfterWrite=30s
# 系统配置缓存：最大 200 条，写入后 30 分钟过期
cache.caffeine.sys-config.spec=maximumSize=200,expireAfterWrite=30m
